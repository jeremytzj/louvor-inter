<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louvor Inter 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons for some icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Playlist - Inter 2026</h2>
            </div>
            <ul class="song-list" id="song-list">
                <!-- Lista de músicas renderizada via JS -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button id="toggle-sidebar-btn" class="icon-btn" aria-label="Menu">
                        <ion-icon name="menu-outline"></ion-icon>
                    </button>
                    <h1 id="song-title">Selecione uma música</h1>
                </div>
                <div class="header-right">
                    <button id="theme-toggle-btn" class="icon-btn" aria-label="Alternar Tema">
                        <ion-icon name="sunny-outline" class="sun-icon"></ion-icon>
                        <ion-icon name="moon-outline" class="moon-icon"></ion-icon>
                    </button>
                </div>
            </header>

            <div class="song-controls" id="song-controls" style="display: none;">
                <div class="audio-container" id="audio-container">
                    <!-- Áudios injetados via JS -->
                </div>
                
                <div class="tools-container">
                    <div class="tool-group transposer">
                        <span class="tool-label">Tom: <strong id="current-key">-</strong></span>
                        <div class="tool-buttons">
                            <button id="btn-transpose-down" class="btn" aria-label="-1 Tom">-1 Tom</button>
                            <button id="btn-transpose-up" class="btn" aria-label="+1 Tom">+1 Tom</button>
                        </div>
                    </div>
                    
                    <div class="tool-group drawing-tools">
                        <div class="tool-buttons">
                            <button id="btn-draw-toggle" class="btn icon-btn" aria-label="Modo Caneta" title="Modo Caneta">
                                <ion-icon name="pencil-outline"></ion-icon>
                            </button>
                            <button id="btn-draw-undo" class="btn icon-btn" aria-label="Desfazer" title="Desfazer" style="display: none;">
                                <ion-icon name="arrow-undo-outline"></ion-icon>
                            </button>
                            <button id="btn-draw-clear" class="btn icon-btn" aria-label="Limpar" title="Limpar" style="display: none;">
                                <ion-icon name="trash-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cypher-area" id="cypher-area">
                <div id="cypher-content" class="cypher-content">
                    <canvas id="drawing-canvas"></canvas>
                    <div class="placeholder-text">
                        <ion-icon name="musical-notes-outline"></ion-icon>
                        <p>Escolha uma música na barra lateral para começar.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
